<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIRP — Offline</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f8fafc;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; padding: 24px;
        }
        .card {
            background: #fff;
            border-radius: 20px;
            padding: 40px 32px;
            text-align: center;
            max-width: 360px;
            width: 100%;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .icon { font-size: 4rem; margin-bottom: 20px; }
        h1 { font-size: 1.4rem; font-weight: 800; color: #1e293b; margin-bottom: 8px; }
        p { color: #64748b; font-size: 0.9rem; line-height: 1.6; margin-bottom: 24px; }
        .logo { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 28px; }
        .logo-icon {
            width: 44px; height: 44px; border-radius: 12px;
            background: linear-gradient(135deg, #1e3a5f, #2563eb);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; color: #fff;
        }
        .logo-text { font-size: 1.2rem; font-weight: 800; color: #1e3a5f; }
        .btn {
            display: block; width: 100%; padding: 14px;
            background: linear-gradient(135deg, #1e3a5f, #2563eb);
            color: #fff; border: none; border-radius: 12px;
            font-size: 0.9rem; font-weight: 700; cursor: pointer;
            text-decoration: none; transition: opacity 0.15s;
        }
        .btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="logo-icon">🅿️</div>
            <div class="logo-text">SIRP</div>
        </div>
        <div class="icon">📶</div>
        <h1>Tidak Ada Koneksi</h1>
        <p>Anda sedang offline. Periksa koneksi internet Anda dan coba lagi.</p>
        <button class="btn" onclick="window.location.reload()">🔄 Coba Lagi</button>
    </div>
</body>
</html>
